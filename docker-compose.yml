# =============================================================================
# Second Brain — Docker Compose (Phase 2: api + mysql)
#
# Services:
#   api    — FastAPI application (port 8000 exposed to host)
#   mysql  — MySQL 8.4 database (internal network only, NOT exposed to host)
#
# Secrets: loaded at RUNTIME via env_file (.env); never baked into images.
#
# Usage:
#   cp .env.example .env    # fill in real values (gitignored)
#   docker compose up -d --build
#   open http://localhost:8000/docs
#
# Run migrations before using the API:
#   docker compose exec api alembic upgrade head
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MySQL 8.4 — relational store
  # Not exposed to host in this config (internal Docker network only).
  # For local development access via a DB client (TablePlus, DBeaver):
  #   create docker-compose.override.yml and add ports: ["3306:3306"] to mysql.
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    command: --innodb-ft-min-token-size=2
    env_file:
      - .env
    environment:
      # These variable names are what the mysql:8.4 image reads at init time.
      # They must match the keys in your .env file.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "--password=${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama — local LLM runtime (Phase 5)
  # Internal Docker network only (NO host port mapping — threat T-05-01).
  # Memory-bounded via the top-level `mem_limit` key (NOT deploy.resources,
  # which plain `docker compose up` silently ignores — RESEARCH Pitfall 3, D-09).
  # Healthcheck uses `ollama list` because the image ships no curl (Pitfall 2).
  # One-time model pull after first `up` (fresh volume has no models):
  #   docker compose exec ollama ollama pull llama3.2:3b
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.31.1
    environment:
      # Cap concurrent model loads so overlapping requests can't compound
      # memory pressure and OOM-kill the container (Pitfall 6).
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    volumes:
      - ollama_data:/root/.ollama
    mem_limit: 4g
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI API — the main application
  # Port 8000 is the only port exposed to the host.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Named volumes — data persists across container restarts and rebuilds.
# To wipe all data: docker compose down -v
# ---------------------------------------------------------------------------
volumes:
  mysql_data:
  ollama_data:

# ---------------------------------------------------------------------------
# Networks — internal Docker bridge network.
# The api and mysql services communicate via service names (not localhost).
# No external traffic can reach mysql directly.
# ---------------------------------------------------------------------------
networks:
  backend:
    driver: bridge
